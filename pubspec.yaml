name: flutter_app
description: "Flutter client for Shinokawa Chat with streaming, sync, and attachments."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  drift: ^2.26.1
  file_picker: ^10.3.2
  flutter_markdown: ^0.7.7+1
  google_fonts: ^6.3.2
  http: ^1.5.0
  image_picker: ^1.2.0
  markdown: ^7.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.39
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/shinochat_icon.svg
