name: Build Android

on:
  workflow_call:
    secrets:
      SIGNING_KEY:
        description: Base64 encoded keystore
        required: false
      KEY_STORE_PASSWORD:
        description: Keystore password
        required: false
      ALIAS:
        description: Key alias
        required: false
      KEY_PASSWORD:
        description: Key password
        required: false
    outputs:
      version:
        description: App version name
        value: ${{ jobs.build.outputs.version }}
      artifact-name:
        description: Artifact name
        value: ${{ jobs.build.outputs.artifact-name }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact-name: release-android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME="${RAW_VERSION%%+*}"
          echo "version=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing (optional)
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${SIGNING_KEY}" && -n "${KEY_STORE_PASSWORD}" && -n "${ALIAS}" && -n "${KEY_PASSWORD}" ]]; then
            echo "Configuring release signing."
            echo "${SIGNING_KEY}" | base64 --decode > android/upload-keystore.jks
            {
              echo "storePassword=${KEY_STORE_PASSWORD}"
              echo "keyPassword=${KEY_PASSWORD}"
              echo "keyAlias=${ALIAS}"
              echo "storeFile=upload-keystore.jks"
            } > android/key.properties
          else
            echo "Signing secrets not fully set. Falling back to debug signing."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
